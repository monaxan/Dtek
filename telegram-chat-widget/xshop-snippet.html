<!--
  X-Shop Telegram chat widget
  1. Replace YOUR-WORKER with your deployed Cloudflare Worker address.
  2. Paste this whole block into the global custom HTML/JS area before </body>.
-->
<script>
(() => {
  if (window.__brunetteTelegramChatLoaded) return;
  window.__brunetteTelegramChatLoaded = true;

  const CONFIG = {
    apiUrl: "https://YOUR-WORKER.workers.dev/api/message",
    accent: "#111111",
    titleUk: "Напишіть нам",
    titleRu: "Напишите нам",
    subtitleUk: "Зазвичай відповідаємо швидко",
    subtitleRu: "Обычно отвечаем быстро",
  };

  const isUk = (document.documentElement.lang || "").toLowerCase().startsWith("uk");
  const t = isUk
    ? {
        title: CONFIG.titleUk,
        subtitle: CONFIG.subtitleUk,
        name: "Ваше ім’я",
        contact: "Телефон або Telegram",
        message: "Ваше повідомлення",
        send: "Надіслати",
        sending: "Надсилаємо…",
        success: "Дякуємо! Повідомлення надіслано.",
        error: "Не вдалося надіслати. Спробуйте ще раз.",
        open: "Відкрити чат",
        close: "Закрити чат",
      }
    : {
        title: CONFIG.titleRu,
        subtitle: CONFIG.subtitleRu,
        name: "Ваше имя",
        contact: "Телефон или Telegram",
        message: "Ваше сообщение",
        send: "Отправить",
        sending: "Отправляем…",
        success: "Спасибо! Сообщение отправлено.",
        error: "Не удалось отправить. Попробуйте ещё раз.",
        open: "Открыть чат",
        close: "Закрыть чат",
      };

  const startedAt = Date.now();
  const storageKey = "brunette_chat_visitor_id";
  let visitorId = localStorage.getItem(storageKey);
  if (!visitorId) {
    visitorId = "v_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 9);
    localStorage.setItem(storageKey, visitorId);
  }

  const host = document.createElement("div");
  host.id = "brunette-chat-host";
  document.body.appendChild(host);
  const root = host.attachShadow({ mode: "open" });

  root.innerHTML = `
    <style>
      :host { all: initial; }
      * { box-sizing: border-box; }
      .bc-wrap { position: fixed; right: 20px; bottom: 20px; z-index: 2147483000; font-family: Arial, sans-serif; }
      .bc-button { width: 58px; height: 58px; border: 0; border-radius: 50%; background: ${CONFIG.accent}; color: #fff; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,.22); display: grid; place-items: center; transition: transform .2s ease; }
      .bc-button:hover { transform: translateY(-2px); }
      .bc-button svg { width: 27px; height: 27px; fill: currentColor; }
      .bc-panel { position: absolute; right: 0; bottom: 72px; width: min(360px, calc(100vw - 28px)); background: #fff; color: #171717; border: 1px solid rgba(0,0,0,.09); border-radius: 18px; box-shadow: 0 18px 55px rgba(0,0,0,.22); overflow: hidden; opacity: 0; visibility: hidden; transform: translateY(12px) scale(.98); transform-origin: bottom right; transition: .2s ease; }
      .bc-panel.open { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
      .bc-head { background: ${CONFIG.accent}; color: #fff; padding: 18px 20px; display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; }
      .bc-title { margin: 0 0 4px; font-size: 18px; font-weight: 700; }
      .bc-subtitle { margin: 0; font-size: 13px; opacity: .8; }
      .bc-close { border: 0; background: transparent; color: #fff; font-size: 25px; line-height: 1; cursor: pointer; padding: 0; }
      .bc-body { padding: 18px; }
      .bc-field { width: 100%; margin: 0 0 11px; border: 1px solid #d9d9d9; border-radius: 11px; padding: 12px 13px; font: inherit; font-size: 14px; color: #171717; background: #fff; outline: none; }
      .bc-field:focus { border-color: ${CONFIG.accent}; box-shadow: 0 0 0 2px rgba(0,0,0,.07); }
      textarea.bc-field { min-height: 104px; resize: vertical; }
      .bc-hp { position: absolute !important; left: -9999px !important; opacity: 0 !important; pointer-events: none !important; }
      .bc-submit { width: 100%; border: 0; border-radius: 11px; padding: 13px 16px; background: ${CONFIG.accent}; color: #fff; font: inherit; font-size: 14px; font-weight: 700; cursor: pointer; }
      .bc-submit:disabled { opacity: .6; cursor: wait; }
      .bc-status { min-height: 19px; margin-top: 10px; font-size: 13px; line-height: 1.4; }
      .bc-status.ok { color: #18794e; }
      .bc-status.error { color: #b42318; }
      @media (max-width: 480px) {
        .bc-wrap { right: 14px; bottom: 14px; }
        .bc-panel { position: fixed; right: 14px; bottom: 84px; }
      }
    </style>
    <div class="bc-wrap">
      <section class="bc-panel" aria-hidden="true">
        <header class="bc-head">
          <div>
            <h2 class="bc-title">${t.title}</h2>
            <p class="bc-subtitle">${t.subtitle}</p>
          </div>
          <button class="bc-close" type="button" aria-label="${t.close}">×</button>
        </header>
        <form class="bc-body">
          <input class="bc-field" name="name" type="text" maxlength="80" placeholder="${t.name}" autocomplete="name">
          <input class="bc-field" name="contact" type="text" maxlength="120" placeholder="${t.contact}" autocomplete="tel" required>
          <textarea class="bc-field" name="message" maxlength="1500" placeholder="${t.message}" required></textarea>
          <input class="bc-hp" name="website" type="text" tabindex="-1" autocomplete="off">
          <button class="bc-submit" type="submit">${t.send}</button>
          <div class="bc-status" role="status" aria-live="polite"></div>
        </form>
      </section>
      <button class="bc-button" type="button" aria-label="${t.open}" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H8l-5 4v-4a2 2 0 0 1-1-1.73V6a2 2 0 0 1 2-2Zm2.5 6.75a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5Zm5.5 0a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5Zm5.5 0a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5Z"/></svg>
      </button>
    </div>
  `;

  const panel = root.querySelector(".bc-panel");
  const openButton = root.querySelector(".bc-button");
  const closeButton = root.querySelector(".bc-close");
  const form = root.querySelector("form");
  const submit = root.querySelector(".bc-submit");
  const status = root.querySelector(".bc-status");

  const setOpen = (open) => {
    panel.classList.toggle("open", open);
    panel.setAttribute("aria-hidden", String(!open));
    openButton.setAttribute("aria-expanded", String(open));
    if (open) setTimeout(() => form.elements.contact.focus(), 80);
  };

  openButton.addEventListener("click", () => setOpen(!panel.classList.contains("open")));
  closeButton.addEventListener("click", () => setOpen(false));

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    status.textContent = "";
    status.className = "bc-status";
    submit.disabled = true;
    submit.textContent = t.sending;

    const data = new FormData(form);
    const payload = {
      name: String(data.get("name") || ""),
      contact: String(data.get("contact") || ""),
      message: String(data.get("message") || ""),
      website: String(data.get("website") || ""),
      page: location.href,
      referrer: document.referrer,
      visitorId,
      startedAt,
    };

    try {
      const response = await fetch(CONFIG.apiUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok || !result.ok) throw new Error(result.error || "Request failed");

      status.textContent = t.success;
      status.className = "bc-status ok";
      form.elements.message.value = "";
    } catch (error) {
      console.error("Chat widget error", error);
      status.textContent = t.error;
      status.className = "bc-status error";
    } finally {
      submit.disabled = false;
      submit.textContent = t.send;
    }
  });
})();
</script>
